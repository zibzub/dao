<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tao</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div
    class="svg-animation"
    data-src-a="img/dao-logo.svg"
    data-src-b="img/dao-logo_inv.svg"
    role="button"
    tabindex="0"
    aria-label="Animate MoonCat DAO logo"
  >
    <div class="svg-animation__track">
      <img class="svg-animation__image svg-animation__image--first" alt="MoonCat DAO logo">
      <img class="svg-animation__image svg-animation__image--second" alt="" aria-hidden="true">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
