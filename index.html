<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dao</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a
    class="corner-control back-control"
    href="https://zibzub.art/"
    aria-label="Back to zibzub.art"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="m15 18-6-6 6-6"></path>
    </svg>
  </a>

  <button
    class="corner-control sound-toggle"
    type="button"
    aria-label="Turn sound on"
    aria-pressed="false"
  >
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <g class="sound-icon sound-icon--on">
        <ellipse cx="12" cy="8" rx="6" ry="2.5"></ellipse>
        <path d="M6 8v7c0 1.4 2.7 2.5 6 2.5s6-1.1 6-2.5V8"></path>
        <path d="m8 18-1 2m9-2 1 2"></path>
      </g>
      <g class="sound-icon sound-icon--off">
        <ellipse cx="12" cy="8" rx="6" ry="2.5"></ellipse>
        <path d="M6 8v7c0 1.4 2.7 2.5 6 2.5s6-1.1 6-2.5V8"></path>
        <path d="m5 4 14 16"></path>
      </g>
    </svg>
  </button>

  <div
    class="svg-animation"
    data-src-a="img/dao.svg"
    data-src-b="img/dao_inv.svg"
    role="button"
    tabindex="0"
    aria-label="DAO"
  >
    <div class="svg-animation__track">
      <img class="svg-animation__image svg-animation__image--first" alt="DAO">
      <img class="svg-animation__image svg-animation__image--second" alt="" aria-hidden="true">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
